version: '3.8'

services:
  vlm-speculative:
    image: vllm/vllm:latest
    container_name: vlm-speculative-decoding
    runtime: nvidia
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - vlm-models:/root/.cache/huggingface
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    command: >
      python -m vllm.entrypoints.openai.api_server
      --model meta-llama/Llama-2-7b-hf
      --speculative-model meta-llama/Llama-2-13b-hf
      --port 8000
      --dtype float16
      --gpu-memory-utilization 0.9
      --max-model-len 4096
      --max-num-batched-tokens 4096
      --enable-prefix-caching
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  vlm-models:
    driver: local

networks:
  default:
    name: openclaw-vlm
