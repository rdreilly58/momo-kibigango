version: "3.9"

# Self-hosted ntfy notification server
#
# Listens on 127.0.0.1:8085 (loopback only).
# Reachable from iPhone/iPad via local network or direct SSH tunnel.
# Note: Tailscale was removed 2026-05-01 — no longer used for remote access.
#
# Prerequisites
# -------------
#   NTFY_USER and NTFY_PASS must be set in ~/.openclaw/.env before starting.
#   The first-run init script (scripts/ntfy-init-user.sh) creates the htpasswd
#   entry inside the container — run it once after `docker compose up -d`.
#
# Starting / stopping
# --------------------
#   cd config/ntfy && docker compose up -d
#   docker compose down
#
# Upgrading
#   docker compose pull && docker compose up -d

services:
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: openclaw-ntfy
    restart: unless-stopped
    command: serve
    environment:
      # ntfy reads these to locate its config file inside the container
      TZ: America/New_York
    ports:
      # Bind to loopback only — never expose on 0.0.0.0
      - "127.0.0.1:8085:80"
    volumes:
      # Persistent data: message cache + user DB
      - ${HOME}/.openclaw/ntfy-data/cache:/var/cache/ntfy
      # Server config file (see ntfy-server.yml alongside this file)
      - ${HOME}/.openclaw/ntfy-data/config:/etc/ntfy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/v1/health | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 3
