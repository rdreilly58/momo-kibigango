apiVersion: 1

datasources:
  - name: OpenClaw-Prometheus
    type: prometheus
    uid: openclaw-prometheus
    access: proxy
    url: http://localhost:9091
    isDefault: true
    editable: false
    jsonData:
      httpMethod: GET
      timeInterval: "15s"

  - name: OpenClaw-TSDB
    type: prometheus
    uid: openclaw-tsdb
    access: proxy
    url: http://localhost:9090
    isDefault: false
    editable: false
    jsonData:
      httpMethod: GET
      timeInterval: "15s"
