apiVersion: 1

contactPoints:
  - orgId: 1
    name: Telegram
    receivers:
      - uid: openclaw-telegram
        type: telegram
        settings:
          # botToken is sensitive — interpolated from launchctl env (see SECRETS.md).
          # chatid is just an identifier (Bob's Telegram user ID), and Grafana's
          # env interpolation strips quotes, causing "cannot unmarshal number
          # into Go struct field Config.chatid of type string" startup failure.
          # So chatid lives as a literal here.
          botToken: "$TELEGRAM_BOT_TOKEN"
          chatid: "8755120444"
          message: |
            🚨 {{ .CommonLabels.alertname }}
            Status: {{ .Status | toUpper }}
            Severity: {{ .CommonLabels.severity }}
            {{ range .Alerts }}
            • {{ .Annotations.summary }}
              {{ .Annotations.description }}
            {{ end }}
          parse_mode: "HTML"
          disable_notification: false
        disableResolveMessage: false

  - orgId: 1
    name: Ntfy
    receivers:
      - uid: openclaw-ntfy
        type: webhook
        settings:
          # Self-hosted ntfy on loopback — requires NTFY_TOPIC_URL exported into
          # Grafana's environment (launchctl setenv + brew services restart grafana).
          # Grafana supports $VAR interpolation in provisioning files.
          # NTFY_TOPIC_URL=http://127.0.0.1:8085/openclaw (set in ~/.openclaw/.env)
          url: "$NTFY_TOPIC_URL"
          httpMethod: POST
          # Basic auth for self-hosted ntfy — set NTFY_USER / NTFY_PASS via
          # launchctl setenv (see SECRETS.md for the procedure).
          basicAuthUser: "$NTFY_USER"
          basicAuthPassword: "$NTFY_PASS"
        disableResolveMessage: false

  - orgId: 1
    name: Slack
    receivers:
      - uid: openclaw-slack
        type: slack
        settings:
          # Webhook URL is provisioned via Grafana env interpolation. Set in
          # Grafana's environment (launchctl setenv SLACK_WEBHOOK_URL ...) so
          # the secret never lands in git. See config/SECRETS.md.
          url: "$SLACK_WEBHOOK_URL"
          title: "{{ .CommonLabels.alertname }} — {{ .Status | toUpper }}"
          text: |
            *Severity:* {{ .CommonLabels.severity }}
            {{ range .Alerts }}
            • {{ .Annotations.summary }}
              {{ .Annotations.description }}
            {{ end }}
        disableResolveMessage: false
