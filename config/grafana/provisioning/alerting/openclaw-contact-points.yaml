apiVersion: 1

contactPoints:
  - orgId: 1
    name: Telegram
    receivers:
      - uid: openclaw-telegram
        type: telegram
        settings:
          # Grafana provisioning supports $VAR env-var interpolation. Both
          # values must be exported into Grafana's environment — see SECRETS.md
          # for the launchctl setenv + brew services restart procedure.
          botToken: "$TELEGRAM_BOT_TOKEN"
          chatid: "$TELEGRAM_CHAT_ID"
          message: |
            🚨 {{ .CommonLabels.alertname }}
            Status: {{ .Status | toUpper }}
            Severity: {{ .CommonLabels.severity }}
            {{ range .Alerts }}
            • {{ .Annotations.summary }}
              {{ .Annotations.description }}
            {{ end }}
          parse_mode: "HTML"
          disable_notification: false
        disableResolveMessage: false

  - orgId: 1
    name: Ntfy
    receivers:
      - uid: openclaw-ntfy
        type: webhook
        settings:
          # Self-hosted ntfy on loopback — requires NTFY_TOPIC_URL exported into
          # Grafana's environment (launchctl setenv + brew services restart grafana).
          # Grafana supports $VAR interpolation in provisioning files.
          # NTFY_TOPIC_URL=http://127.0.0.1:8085/openclaw (set in ~/.openclaw/.env)
          url: "$NTFY_TOPIC_URL"
          httpMethod: POST
          # Basic auth for self-hosted ntfy — set NTFY_USER / NTFY_PASS via
          # launchctl setenv (see SECRETS.md for the procedure).
          basicAuthUser: "$NTFY_USER"
          basicAuthPassword: "$NTFY_PASS"
        disableResolveMessage: false

  - orgId: 1
    name: Slack
    receivers:
      - uid: openclaw-slack
        type: slack
        settings:
          # Replace with the incoming-webhook URL after creating the Slack app.
          # See config/notifications.md for setup steps. Until set, Grafana
          # delivery to Slack will fail silently — no other channels affected.
          url: "__REPLACE_WITH_SLACK_WEBHOOK_URL__"
          title: "{{ .CommonLabels.alertname }} — {{ .Status | toUpper }}"
          text: |
            *Severity:* {{ .CommonLabels.severity }}
            {{ range .Alerts }}
            • {{ .Annotations.summary }}
              {{ .Annotations.description }}
            {{ end }}
        disableResolveMessage: false
